name: Test Fleet health and Env Variables

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::118107592194:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Fleet Health Checks
        id: health
        shell: bash
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "hostname -I",
                "docker --version 2>/dev/null || echo Docker not installed",
                "aws --version 2>/dev/null || echo AWS CLI not installed",
                "mysql --version 2>/dev/null || echo MySQL not installed",
                "aws ssm get-parameters-by-path --path /application/banking --with-decryption --region us-east-1"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait for SSM Command
        run: sleep 20

      - name: Show Results
        shell: bash
        run: |
          aws ssm list-command-invocations \
            --command-id "${{ steps.health.outputs.cmd_id }}" \
            --details \
            --region us-east-1 \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}" \
            --output table

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.health.outputs.cmd_id }}" \
            --details \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Health Check Failed on $FAILED instance(s)"
            exit 1
          fi

          echo "All instances are healthy ✅"