name: Test Fleet health and Env Variables

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::118107592194:role/sourabh07-create-new-policy
          aws-region: us-east-1

      - name: Fleet Health Check
        id: health
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "hostname -I",
                "docker --version 2>/dev/null || echo Docker not installed",
                "aws --version 2>/dev/null || echo AWS CLI not installed",
                "mysql --version 2>/dev/null || echo MySQL not installed",
                "aws ssm get-parameters-by-path --path /application/banking --with-decryption --region us-east-1"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "CMD_ID=$CMD_ID" >> $GITHUB_ENV

      - name: Show Results
        run: |
          sleep 20

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --region us-east-1 \
            --query "CommandInvocations[*].{Instance:InstanceId,Output:CommandPlugins[0].Output}" \
            --output table

          FAILED_INSTANCES=$(aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --region us-east-1 \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text)

          if [ "$FAILED_INSTANCES" -gt 0 ]; then
            echo "::error::Health check failed on $FAILED_INSTANCES instance(s)"
            exit 1
          fi

          echo "All instances are healthy ✅"