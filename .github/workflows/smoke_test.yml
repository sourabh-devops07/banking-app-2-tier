name: Smoke Testing

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::118107592194:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Validate Target Instances
        shell: bash
        run: |
          INSTANCE_COUNT=$(aws ssm describe-instance-information \
            --filters "Key=tag:App,Values=flask" \
            --query "length(InstanceInformationList)" \
            --output text \
            --region us-east-1)

          echo "Instances found: $INSTANCE_COUNT"

          if [ "$INSTANCE_COUNT" -eq 0 ]; then
            echo "❌ No EC2 instances found with tag App=flask"
            exit 1
          fi

      - name: Upload smoke_test.py to S3
        run: |
          aws s3 cp smoke_test.py s3://blogging-2026-sour/smoke_test.py --region us-east-1

      - name: Execute Smoke Test on Fleet
        id: smoke
        shell: bash
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "aws s3 cp s3://blogging-2026-sour/smoke_test.py /tmp/smoke_test.py",
                "python3 /tmp/smoke_test.py"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "Command ID: $CMD_ID"

      - name: Wait for SSM Execution
        shell: bash
        run: |
          CMD_ID="${{ steps.smoke.outputs.cmd_id }}"

          STATUS="InProgress"

          while [[ "$STATUS" == "InProgress" || "$STATUS" == "Pending" || "$STATUS" == "Delayed" ]]; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --query "CommandInvocations[0].Status" \
              --output text \
              --region us-east-1)

            echo "Current Status: $STATUS"
            sleep 5
          done

      - name: Show Results & Validate
        shell: bash
        run: |
          CMD_ID="${{ steps.smoke.outputs.cmd_id }}"

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --region us-east-1 \
            --output table

          FAILED=$(aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "length(CommandInvocations[?Status=='Failed' || Status=='TimedOut' || Status=='Cancelled'])" \
            --output text \
            --region us-east-1)

          echo "Failed count: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Smoke Test FAILED"
            exit 1
          fi

          echo "✅ Smoke Test PASSED"