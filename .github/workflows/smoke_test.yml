name: Smoke Testing

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::118107592194:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Upload smoke_test.py to S3
        run: |
          aws s3 cp smoke_test.py \
            s3://blogging-2026-sour/smoke_test.py \
            --region us-east-1

      - name: Execute Smoke Test on Fleet
        id: smoke
        shell: bash
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "aws s3 cp s3://blogging-2026-sour/smoke_test.py /tmp/smoke_test.py",
                "python3 /tmp/smoke_test.py"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait for Completion
        run: sleep 30

      - name: Show Results
        shell: bash
        run: |
          aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --details \
            --region us-east-1 \
            --output table

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --details \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Smoke Test Failed"
            exit 1
          fi

          echo "✅ Smoke Test Passed"